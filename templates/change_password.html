<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CyberShield">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='pwa/icon.svg') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='pwa/maskable-icon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='app-shell.css') }}">
    <title>Change Password</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
            overflow:hidden;
            position:relative;
        }

        body::before{
            content:'';
            position:absolute;
            width:420px;
            height:420px;
            background:#38bdf8;
            border-radius:50%;
            filter:blur(170px);
            opacity:0.15;
            top:-100px;
            left:-100px;
        }

        body::after{
            content:'';
            position:absolute;
            width:350px;
            height:350px;
            background:#22c55e;
            border-radius:50%;
            filter:blur(150px);
            opacity:0.12;
            bottom:-100px;
            right:-100px;
        }

        .password-box{
            position:relative;
            width:420px;
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:25px;
            padding:40px;
            text-align:center;
            box-shadow:0 0 35px rgba(0,0,0,0.45);
            z-index:1;
        }

        .password-box h1{
            color:#38bdf8;
            font-size:32px;
            margin-bottom:10px;
        }

        .password-box p{
            color:#cbd5e1;
            margin-bottom:26px;
            font-size:14px;
        }

        .alert{
            padding:12px 14px;
            border-radius:12px;
            margin-bottom:18px;
            font-size:13px;
            text-align:left;
        }

        .alert.success{
            color:#bbf7d0;
            background:rgba(34,197,94,0.12);
            border:1px solid rgba(34,197,94,0.25);
        }

        .alert.error{
            color:#fecaca;
            background:rgba(239,68,68,0.12);
            border:1px solid rgba(239,68,68,0.25);
        }

        .input-group{
            position:relative;
            margin-bottom:18px;
        }

        .input-group i{
            position:absolute;
            left:15px;
            top:50%;
            transform:translateY(-50%);
            color:#94a3b8;
        }

        .input-group input{
            width:100%;
            padding:14px 45px;
            border:none;
            border-radius:14px;
            background:rgba(255,255,255,0.08);
            color:white;
            outline:none;
            font-size:15px;
        }

        .input-group input::placeholder{
            color:#cbd5e1;
        }

        .change-btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:14px;
            background:#38bdf8;
            color:#0f172a;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        .change-btn:hover{
            background:#0ea5e9;
            transform:scale(1.03);
        }

        .links{
            margin-top:22px;
        }

        .links a{
            color:#cbd5e1;
            text-decoration:none;
            font-size:14px;
            transition:0.3s;
        }

        .links a:hover{
            color:#38bdf8;
        }

        @media(max-width:500px){
            .password-box{
                width:90%;
                padding:30px 20px;
            }

            .password-box h1{
                font-size:28px;
            }
        }
    </style>
</head>

<body class="app-main theme-{{ session.theme or 'dark' }}">
{% include "_sidebar.html" %}
<div class="password-box">
    <h1>
        <i class="fa-solid fa-user-lock"></i>
        Change Password
    </h1>

    <p>Confirm your current password before choosing a new one.</p>

    {% if message %}
    <div class="alert success">{{ message }}</div>
    {% endif %}

    {% if error %}
    <div class="alert error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password"
                   name="current_password"
                   placeholder="Current Password"
                   autocomplete="current-password"
                   required>
        </div>

        <div class="input-group">
            <i class="fa-solid fa-key"></i>
            <input type="password"
                   name="new_password"
                   placeholder="New Password"
                   autocomplete="new-password"
                   required>
        </div>

        <div class="input-group">
            <i class="fa-solid fa-check"></i>
            <input type="password"
                   name="confirm_password"
                   placeholder="Confirm New Password"
                   autocomplete="new-password"
                   required>
        </div>

        <button type="submit" class="change-btn">
            <i class="fa-solid fa-shield-halved"></i>
            Update Password
        </button>
    </form>

    <div class="links">
        <a href="/">
            <i class="fa-solid fa-arrow-left"></i>
            Back to Dashboard
        </a>
    </div>
</div>
<script src="{{ url_for('static', filename='pwa.js') }}"></script>
</body>
</html>
