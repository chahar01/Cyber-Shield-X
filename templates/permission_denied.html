<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='app-shell.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Permission Denied</title>
    <style>
        *{box-sizing:border-box;font-family:Arial,sans-serif;margin:0;padding:0;}
        body{min-height:100vh;background:linear-gradient(135deg,#0f172a,#111827,#1e293b);color:white;padding:30px;}
        .container{max-width:720px;margin:auto;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:32px;text-align:center;}
        i{font-size:42px;color:#f59e0b;margin-bottom:16px;}
        h1{color:#f8fafc;margin-bottom:10px;}
        p{color:#cbd5e1;margin-bottom:20px;}
        a{display:inline-flex;min-height:42px;align-items:center;padding:10px 14px;border-radius:8px;background:#38bdf8;color:#0f172a;text-decoration:none;font-weight:700;}
    </style>
</head>
<body class="app-main theme-{{ session.theme or 'dark' }}">
{% include "_sidebar.html" %}
<div class="container">
    <i class="fa-solid fa-lock"></i>
    <h1>Permission Denied</h1>
    <p>You do not currently have access to {{ tool.label }}. Contact the administrator if you need this option.</p>
    <a href="/">Back to Dashboard</a>
</div>
</body>
</html>
