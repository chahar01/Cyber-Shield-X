<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='pwa/icon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='app-shell.css') }}">
    <title>Report Details</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        *{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body{ min-height:100vh; background:linear-gradient(135deg,#0f172a,#111827,#1e293b); color:white; padding:30px; }
        .container{ width:100%; max-width:1100px; margin:auto; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:18px; padding:32px; box-shadow:0 0 30px rgba(0,0,0,0.45); }
        .topbar{ display:flex; justify-content:space-between; gap:16px; align-items:flex-start; margin-bottom:24px; }
        h1{ color:#38bdf8; font-size:30px; }
        .muted{ color:#94a3b8; }
        .actions{ display:flex; gap:10px; flex-wrap:wrap; }
        .btn{ min-height:42px; padding:10px 15px; border-radius:10px; display:inline-flex; align-items:center; gap:8px; text-decoration:none; font-weight:700; background:#38bdf8; color:#0f172a; }
        .btn.secondary{ background:rgba(255,255,255,0.08); color:#e2e8f0; }
        .summary{ display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; margin-bottom:22px; }
        .panel{ background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:16px; }
        .panel strong{ display:block; margin-top:6px; color:#f8fafc; }
        pre{ white-space:pre-wrap; word-break:break-word; background:rgba(2,6,23,0.64); border:1px solid rgba(56,189,248,0.18); border-radius:12px; padding:18px; color:#e2e8f0; line-height:1.5; overflow:auto; }
        @media(max-width:800px){ body{ padding:18px; } .topbar{ flex-direction:column; } .summary{ grid-template-columns:1fr; } }
    </style>
</head>
<body class="app-main theme-{{ session.theme or 'dark' }}">
{% include "_sidebar.html" %}

<div class="container">
    <div class="topbar">
        <div>
            <h1><i class="fa-solid fa-file-lines"></i> Report #{{ report.id }}</h1>
            <p class="muted">{{ report.tool }} report generated by {{ report.username }}</p>
        </div>

        <div class="actions">
            <a href="/reports/{{ report.id }}/download-pdf" class="btn">
                <i class="fa-solid fa-file-pdf"></i>
                PDF
            </a>
            <a href="/reports/{{ report.id }}/download-json" class="btn secondary">
                <i class="fa-solid fa-code"></i>
                JSON
            </a>
        </div>
    </div>

    <div class="summary">
        <div class="panel"><span class="muted">Tool</span><strong>{{ report.tool }}</strong></div>
        <div class="panel"><span class="muted">Target</span><strong>{{ report.target or "-" }}</strong></div>
        <div class="panel"><span class="muted">Created</span><strong>{{ report.created_at }}</strong></div>
        <div class="panel"><span class="muted">Summary</span><strong>{{ report.summary or "-" }}</strong></div>
    </div>

    <pre>{{ report.result | tojson(indent=2) }}</pre>
</div>

<script src="{{ url_for('static', filename='pwa.js') }}"></script>
</body>
</html>
